# Deploy peqi.hair: rsync code to VPS → deploy.sh (no git pull on server)
name: Deploy PEQI

on:
  push:
    branches: [main]
  workflow_dispatch:

# Node 24 for JavaScript actions (checkout, etc.) — see GitHub Actions Node 20 deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-peqi
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify GitHub secrets
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ] && missing="${missing} VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}" ] && missing="${missing} VPS_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing="${missing} VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secrets:${missing}"
            echo "Add at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Guide: deploy/GITHUB-ACTIONS-SECRETS.md"
            exit 1
          fi
          echo "Secrets OK (VPS_HOST and VPS_USER are set)"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/peqi_deploy
          chmod 600 ~/.ssh/peqi_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          APP_DIR="${VPS_APP_DIR:-/var/www/peqi}"
          RSYNC_SSH="ssh -i ~/.ssh/peqi_deploy -o StrictHostKeyChecking=accept-new"
          rsync -avz \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'database.sqlite' \
            --exclude 'barbershop.db' \
            --exclude 'public/uploads/shop/*' \
            --exclude 'public/uploads/avatars/*' \
            --exclude 'project_archive' \
            --exclude 'testsprite_tests' \
            -e "$RSYNC_SSH" \
            ./ "${VPS_USER}@${VPS_HOST}:${APP_DIR}/"

      # database.sqlite / barbershop.db are excluded from rsync — production data stays on VPS.
      # deploy.sh runs db:push + migrate:production (additive only).

      - name: Run deploy on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/var/www/peqi; fi
            cd "$APP_DIR"
            if [ ! -f .env ]; then
              echo "ERROR: Missing $APP_DIR/.env — create from deploy/env.production.example"
              exit 1
            fi
            bash deploy/deploy.sh
            bash deploy/verify-live.sh https://peqi.hair || {
              echo "WARN: live site verification failed — check PM2 and dist/public/assets/"
              exit 1
            }
