# Deploy peqi.hair: rsync code to VPS → deploy.sh (no git pull on server)
name: Deploy PEQI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-peqi
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/peqi_deploy
          chmod 600 ~/.ssh/peqi_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          APP_DIR="${VPS_APP_DIR:-/var/www/peqi}"
          RSYNC_SSH="ssh -i ~/.ssh/peqi_deploy -o StrictHostKeyChecking=accept-new"
          rsync -avz \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'database.sqlite' \
            --exclude 'barbershop.db' \
            --exclude 'project_archive' \
            --exclude 'testsprite_tests' \
            -e "$RSYNC_SSH" \
            ./ "${VPS_USER}@${VPS_HOST}:${APP_DIR}/"

      - name: Run deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/var/www/peqi; fi
            cd "$APP_DIR"
            if [ ! -f .env ]; then
              echo "ERROR: Missing $APP_DIR/.env — create from deploy/env.production.example"
              exit 1
            fi
            bash deploy/deploy.sh
