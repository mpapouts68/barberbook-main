# Deploy peqi.hair: push to main → SSH → git pull → deploy.sh
name: Deploy PEQI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-peqi
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/var/www/peqi; fi
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            bash deploy/deploy.sh
